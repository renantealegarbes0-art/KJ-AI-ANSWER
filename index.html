<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>KJ ANSWER</title>

<style>
body {
  margin: 0;
  background: radial-gradient(circle at top, #0a0a0a, #000000);
  font-family: "Courier New", monospace;
  color: #00ccff;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  flex-direction: column;
}

/* 🔥 LOADER */
#loader {
  position: fixed;
  width: 100%;
  height: 100vh;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 99999;
}

.kj {
  font-size: 70px;
  font-weight: bold;
  color: #00ccff;
  text-shadow: 0 0 20px #00ccff, 0 0 40px #00ccff;
  animation: pulse 1s infinite;
}

@keyframes pulse {
  0% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.3); opacity: 0.5; }
  100% { transform: scale(1); opacity: 1; }
}

/* MAIN BOX */
.box {
  width: 360px;
  padding: 30px;
  border-radius: 15px;
  text-align: center;
  background: rgba(0, 0, 0, 0.7);
  border: 1px solid #00ccff;
  box-shadow: 0 0 25px #00ccff;
}

/* LOGO */
.logo {
  font-size: 40px;
  font-weight: bold;
  color: #00ccff;
  text-shadow: 0 0 10px #00ccff;
  margin-bottom: 10px;
}

/* INPUT */
input {
  width: 90%;
  padding: 10px;
  margin: 8px 0;
  border-radius: 8px;
  border: 1px solid #00ccff;
  background: transparent;
  color: #00ccff;
  outline: none;
}

/* BUTTON */
button {
  padding: 10px 20px;
  border-radius: 8px;
  border: none;
  background: #00ccff;
  color: black;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  box-shadow: 0 0 15px #00ccff;
}

/* ANSWER */
#answer {
  margin-top: 20px;
  font-size: 20px;
  color: #66e0ff;
}
</style>
</head>

<body>

<!-- 🔥 LOADER -->
<div id="loader">
  <div class="kj">KJ</div>
</div>

<!-- MAIN UI -->
<div class="box">

<div class="logo">KJ ANSWER</div>

<p>Type your petition:</p>
<input type="text" id="petition">

<p>Ask your question:</p>
<input type="text" id="question">

<button onclick="revealAnswer()">Reveal</button>

<div id="answer"></div>

</div>

<script>

let hiddenAnswer = "";
let capturing = false;

const fakeText = "PETER PLEASE ANSWER";
let fakeIndex = 0;

const petitionInput = document.getElementById("petition");
const questionInput = document.getElementById("question");
const answerBox = document.getElementById("answer");

/* 🔥 REMOVE LOADER */
window.addEventListener("load", function () {

  setTimeout(() => {

    let loader = document.getElementById("loader");

    loader.style.opacity = "0";

    setTimeout(() => {
      loader.style.display = "none";
    }, 500);

  }, 1500);
});

/* 🔥 DOT + SECRET TRIGGER */
petitionInput.addEventListener("input", function () {

  let value = petitionInput.value.toLowerCase().trim();

  if (value.includes("its peter") || value === ".") {

    capturing = true;
    hiddenAnswer = "";
    fakeIndex = 0;

    setTimeout(() => {
      petitionInput.value = "";
    }, 0);
  }
});

/* 🔥 KEY SYSTEM */
petitionInput.addEventListener("keydown", function(e) {

  if (!capturing) return;

  if (e.key === "Backspace") {
    hiddenAnswer = hiddenAnswer.slice(0, -1);
    fakeIndex = Math.max(0, fakeIndex - 1);
    petitionInput.value = fakeText.slice(0, fakeIndex);
    e.preventDefault();
  }

  else if (e.key === " ") {
    hiddenAnswer += " ";

    if (fakeIndex < fakeText.length) {
      petitionInput.value += fakeText[fakeIndex];
      fakeIndex++;
    }

    e.preventDefault();
  }

  else if (e.key.length === 1) {
    hiddenAnswer += e.key;

    if (fakeIndex < fakeText.length) {
      petitionInput.value += fakeText[fakeIndex];
      fakeIndex++;
    }

    e.preventDefault();
  }
});

/* 🔮 REVEAL */
function revealAnswer() {

  const question = questionInput.value.trim();

  if (question === "") {
    answerBox.innerText = "Ask a question first...";
    return;
  }

  if (hiddenAnswer.trim() === "") {
    answerBox.innerText = "No hidden answer detected...";
    return;
  }

  answerBox.innerText = "Thinking...";

  setTimeout(() => {
    answerBox.innerText = "KJ ANSWER: " + hiddenAnswer;
  }, 1000);
}

</script>

</body>
</html>
