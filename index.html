<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>KJ</title>

<style>
body {
  margin: 0;
  background: radial-gradient(circle at top, #0a0a0a, #000000);
  font-family: "Courier New", monospace;
  color: #00ccff;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  flex-direction: column;
}

/* 🔥 LOADING SCREEN */
#loader {
  position: fixed;
  width: 100%;
  height: 100vh;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
  transition: opacity 0.5s ease;
}

.kj {
  font-size: 60px;
  font-weight: bold;
  color: #00ccff;
  text-shadow: 0 0 10px #00ccff, 0 0 30px #00ccff;
  animation: pulse 1s infinite;
}

@keyframes pulse {
  0% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.2); opacity: 0.6; }
  100% { transform: scale(1); opacity: 1; }
}

/* MAIN BOX */
.box {
  width: 360px;
  padding: 30px;
  border-radius: 15px;
  text-align: center;
  background: rgba(0, 0, 0, 0.7);
  border: 1px solid #00ccff;
  box-shadow: 0 0 25px #00ccff;
}

/* LOGO */
.logo {
  font-size: 40px;
  font-weight: bold;
  color: #00ccff;
  text-shadow: 0 0 10px #00ccff, 0 0 30px #00ccff;
  margin-bottom: 10px;
}

/* INPUT */
input {
  width: 90%;
  padding: 10px;
  margin: 8px 0;
  border-radius: 8px;
  border: 1px solid #00ccff;
  background: transparent;
  color: #00ccff;
  outline: none;
}

/* BUTTON */
button {
  padding: 10px 20px;
  border-radius: 8px;
  border: none;
  background: #00ccff;
  color: black;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  box-shadow: 0 0 15px #00ccff;
  transform: scale(1.05);
}

/* ANSWER */
#answer {
  margin-top: 20px;
  font-size: 22px;
  color: #66e0ff;
  text-shadow: 0 0 10px #00ccff;
  min-height: 30px;
}

#answer::after {
  content: "|";
  animation: blink 1s infinite;
}

@keyframes blink {
  50% { opacity: 0; }
}
</style>
</head>

<body>

<!-- 🔥 LOADER -->
<div id="loader">
  <div class="kj">KJ</div>
</div>

<!-- MAIN UI -->
<div class="box">
  <div class="logo">KJ ANSWER</div>

  <p>Type your petition:</p>
  <input type="text" id="petition">

  <p>Ask your question:</p>
  <input type="text" id="question">

  <button onclick="revealAnswer()">Reveal</button>

  <div id="answer"></div>
</div>

<script>

let hiddenAnswer = "";
let capturing = false;

const fakeText = "PETER PLEASE ANSWER";
let fakeIndex = 0;

const petitionInput = document.getElementById("petition");
const questionInput = document.getElementById("question");
const answerBox = document.getElementById("answer");

/* 🔥 LOADER REMOVE */
window.addEventListener("load", function() {
  setTimeout(() => {
    document.getElementById("loader").style.opacity = "0";
    setTimeout(() => {
      document.getElementById("loader").style.display = "none";
    }, 500);
  }, 2000);
});

/* block paste */
petitionInput.addEventListener("paste", e => e.preventDefault());

petitionInput.addEventListener("keydown", function(e) {

  const currentValue = petitionInput.value.toLowerCase();

  /* SECRET TRIGGER */
  if (currentValue === "its peter") {
    capturing = true;
    hiddenAnswer = "";
    fakeIndex = 0;
    petitionInput.value = "";
    e.preventDefault();
    return;
  }

  if (e.key === "Enter") {
    capturing = false;
    return;
  }

  if (capturing) {

    if (e.key === "Backspace") {
      hiddenAnswer = hiddenAnswer.slice(0, -1);
      fakeIndex = Math.max(0, fakeIndex - 1);
      petitionInput.value = fakeText.slice(0, fakeIndex);
    }

    else if (e.key === " ") {
      hiddenAnswer += " ";

      if (fakeIndex < fakeText.length) {
        petitionInput.value += fakeText[fakeIndex];
        fakeIndex++;
      }
    }

    else if (e.key.length === 1) {
      hiddenAnswer += e.key;

      if (fakeIndex < fakeText.length) {
        petitionInput.value += fakeText[fakeIndex];
        fakeIndex++;
      }
    }

    e.preventDefault();
  }
});

function revealAnswer() {

  const question = questionInput.value.trim();

  if (question === "") {
    answerBox.innerText = "Ask a question first...";
    return;
  }

  if (hiddenAnswer.trim() === "") {
    answerBox.innerText = "I cannot see anything... 👁️";
    return;
  }

  answerBox.innerText = "Thinking...";

  setTimeout(() => {
    typeEffect("KJ ANSWER: " + hiddenAnswer);
  }, 1500);
}

function typeEffect(text) {
  answerBox.innerText = "";
  let i = 0;

  const interval = setInterval(() => {
    answerBox.innerText += text[i];
    i++;

    if (i >= text.length) {
      clearInterval(interval);

      setTimeout(() => {
        hiddenAnswer = "";
        capturing = false;
        fakeIndex = 0;
        petitionInput.value = "";
        questionInput.value = "";
      }, 1200);
    }
  }, 40);
}

</script>

</body>
</html>
